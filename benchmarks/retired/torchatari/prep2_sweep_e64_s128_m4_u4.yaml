torchatari:
  max_duration: 600
  inherits: _defaults
  definition: .
  install_variant: unpinned
  install_group: torch
  plan:
    method: per_gpu
  voir:
    options:
      stop: 200
      interval: "1s"
      skip: 5
  argv:
    --num-minibatches: 4
    --update-epochs: 4
    --num-steps: 128
    --num-envs: 64
    --total-timesteps: 500000000
    --env-id: Breakout-v5
    --seed: 1
