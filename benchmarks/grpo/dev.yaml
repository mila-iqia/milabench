
_grpo:
  inherits: _defaults
  definition: .
  install_variant: unpinned
  install_group: torch
  tags:
    - monogpu
  plan:
    method: per_gpu

  argv:
    --output_dir: "{milabench_extra}/output"
    --model_name_or_path: EleutherAI/pythia-1b-deduped
    --per_device_train_batch_size: 8
    --num_generations: 8
    --max_completion_length: 128
    --logging_strategy: "no"
    --log_level: "critical"
    --bf16: true


grpo-single:
  inherits: _grpo
  plan:
    method: per_gpu

grpo-gpus:
  inherits: _grpo
  plan:
    method: njobs
    n: 1


_grpo_vllm:
  inherits: _grpo

  argv:
    --use_vllm: true
    --vllm_importance_sampling_correction: true
    --vllm_mode: "colocate"
    --vllm_gpu_memory_utilization: 0.15
    --vllm_max_model_length: 1024


grpo-vllm-single:
  inherits: _grpo_vllm
  plan:
    method: per_gpu

grpo-vllm-gpus:
  inherits: _grpo_vllm
  plan:
    method: njobs
    n: 1
