
_openinstruct:
  inherits: _defaults
  definition: .
  install_variant: unpinned
  install_group: torch
  plan:
    method: per_gpu

rlhf-single:
  inherits: _openinstruct
  plan:
    method: per_gpu

rlhf-gpus:
  inherits: _openinstruct
  plan:
    method: njobs
    n: 1

  deepspeed:
    --use_deepspeed: true
    --deepspeed_config_file: configs/ds_configs/stage3_no_offloading_accelerate.conf 
    --deepspeed_multinode_launcher: standard
  
  argv:
    - --model_name_or_path
    - meta-llama/Llama-3.1-8B
    - --tokenizer_name
    - meta-llama/Llama-3.1-8B 
    - --use_slow_tokenizer 
    - --max_seq_length
    - 4096 
    - --preprocessing_num_workers
    - 128 
    - --per_device_train_batch_size
    - 1 
    - --gradient_accumulation_steps
    - 2 
    - --learning_rate
    - 5e-06 
    - --lr_scheduler_type
    - linear 
    - --warmup_ratio
    - 0.03 
    - --weight_decay
    - 0.0 
    - --num_train_epochs
    - 2 
    - --output_dir
    - output/sft_8b 
    - --logging_steps
    - 1 
    - --model_revision
    - main 
    - --dataset_mixer_list
    - allenai/tulu-3-sft-mixture
    - 1.0
    - --checkpointing_steps
    - epoch 
    - --dataset_mix_dir
    - output/sft_8b 
    - --exp_name
    - tulu-3-8b-sft 
    - --seed
    - 123
