include:
  - all.yaml

#
# CI overrides: minimum runtime while still exercising each benchmark.
#
# - voir stop reduced to 5 iterations (just enough to confirm it runs)
# - max_duration capped to 300s
# - epochs / steps / repeats reduced to minimum
# - inference prompts reduced
# - multinode benchmarks can be excluded via CI workflow_dispatch exclude_tags
#

_defaults:
  max_duration: 300
  voir:
    options:
      skip: 1
      stop: 5
      interval: "1s"

# ---- torchvision ----

_torchvision:
  argv:
    --epochs: 2

_torchvision_ddp:
  argv:
    --epochs: 2

resnet50:
  voir:
    options:
      stop: 5

resnet50-noio:
  voir:
    options:
      stop: 5

resnet152-ddp-gpus:
  voir:
    options:
      stop: 5

_convnext_large-base:
  voir:
    options:
      stop: 5

# ---- flops ----

_flops:
  argv:
    --number: 5
    --repeat: 10

# ---- huggingface ----

_bert-base:
  voir:
    options:
      stop: 5

# ---- timm ----

focalnet:
  voir:
    options:
      stop: 5

# ---- diffusion ----

_diffusion:
  argv:
    --num_epochs: 1

# ---- lightning ----

_lightning:
  argv:
    --epochs: 2

# ---- dinov2 ----

_dinov2:
  voir:
    options:
      stop: 5

dinov2-giant-single:
  enabled: false
  argv:
    - --output-dir
    - "{milabench_extra}/output"
    - --no-resume
    - --config-file
    - "{benchmark_folder}/src/dinov2/configs/train/vitg14.yaml"
    # THOSE NEED TO BE LAST
    - train.dataset_path=ImageNet:split=TRAIN:root={milabench_data}/FakeImageNet:extra={milabench_data}/FakeImageNet
    - train.batch_size_per_gpu=2
    - train.saveckp_freq=100
    - train.num_workers=10

dinov2-giant-gpus:
  # Changed to be LARGE instead of GIANT
  max_duration: 1800
  argv:
    - --output-dir
    - "{milabench_extra}/output"
    - --no-resume
    - --config-file
    - "{benchmark_folder}/src/dinov2/configs/train/vitl14.yaml"
    # THOSE NEED TO BE LAST
    - train.dataset_path=ImageNet:split=TRAIN:root={milabench_data}/FakeImageNet:extra={milabench_data}/FakeImageNet
    - train.batch_size_per_gpu=2
    - train.saveckp_freq=100
    - train.num_workers=10

# ---- llm ----

_llm:
  max_duration: 600
  voir:
    options:
      stop: 5

llm-lora-single:
  argv:
    gradient_accumulation_steps=1: true

llm-lora-ddp-gpus:
  argv:
    batch_size=1: true
    gradient_accumulation_steps=1: true

llm-lora-mp-gpus:
  argv:
    gradient_accumulation_steps=1: true

llm-full-mp-gpus:
  argv:
    batch_size=1: true
    gradient_accumulation_steps=1: true

# ---- purejaxrl ----

dqn:
  argv:
    --buffer_size: 8192
    --buffer_batch_size: 4096
    --total_timesteps: 100000

ppo:
  argv:
    --total_timesteps: 100000

# ---- geo_gnn ----

pna:
  argv:
    --num-samples: 1000

dimenet:
  argv:
    --num-samples: 1000

# ---- recursiongfn ----

recursiongfn:
  argv:
    --num_steps: 10

# ---- llava ----

_llava:
  max_duration: 300

# ---- rlhf ----

_rlhf:
  voir:
    options:
      stop: 5

# ---- vjepa ----

_vjepa:
  voir:
    options:
      stop: 5

# ---- llama (inference) ----

llama:
  max_duration: 300
  voir:
    options:
      stop: 5

# ---- vllm ----

vllm-dense-physics-gpus:
  client:
    argv:
      --num-prompts: 10

vllm-moe-code-gpus:
  enabled: false
  client:
    argv:
      --num-prompts: 10

# ---- inference pipelines ----

whisper-transcribe-single:
  voir:
    options:
      stop: 5
  argv:
    --batch_size: "auto_batch(8)"

txt-to-image-single:
  voir:
    options:
      stop: 5
  argv:
    --batch_size: "auto_batch(1)"

llm-chat-completion:
  voir:
    options:
      stop: 5

# ---- multinode ----

diffusion-nodes:
  enabled: true

llm-lora-ddp-nodes:
  # Too long on the spark
  enabled: false

  argv:
    batch_size=1: true
    gradient_accumulation_steps=1: true

llm-full-mp-nodes:
  enabled: false

dinov2-giant-nodes:
  #
  # dinov2 uses voir which is not compatible with multi node running
  # dinov2 also overide a lot of things using voir so we need to modify it
  #
  enabled: false

# ---- cleanrljax (already disabled in standard) ----

cleanrljax:
  argv:
    --total_timesteps: 100000
